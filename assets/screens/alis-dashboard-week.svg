<svg xmlns="http://www.w3.org/2000/svg" width="430" height="860" viewBox="0 0 430 860" role="img" aria-labelledby="title desc">
  <title id="title">7-day ALIS dashboard demo screen</title>
  <desc id="desc">A sanitized 7-day ALIS dashboard with life balance scores, daily activity, sleep trend, sport history, HRV and VO2 summaries.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7faf9"/>
      <stop offset="1" stop-color="#eef6f4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#08242a" flood-opacity=".10"/>
    </filter>
    <style>
      .label{font:800 12px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#6a7880}
      .title{font:900 25px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#111b29}
      .h2{font:900 18px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#111b29}
      .big{font:900 30px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#111b29}
      .body{font:600 13px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#63717a}
      .small{font:900 12px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#0b5d6f}
      .axis{stroke:#d9e4e2;stroke-width:1}
    </style>
  </defs>
  <rect width="430" height="860" fill="url(#bg)"/>
  <text x="28" y="65" class="small">ALIS</text>
  <text x="28" y="96" class="title">7-day view</text>
  <text x="284" y="82" class="body">Updated 09:42</text>

  <g transform="translate(28 122)">
    <rect width="374" height="42" rx="14" fill="#fff" stroke="#dfe7e6"/>
    <rect x="126" width="122" height="42" rx="14" fill="#0b5d6f"/>
    <text x="36" y="27" font-size="14" font-weight="900" fill="#111b29" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">Today</text>
    <text x="176" y="27" font-size="14" font-weight="900" fill="#fff" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">7d</text>
    <text x="296" y="27" font-size="14" font-weight="900" fill="#111b29" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">30d</text>
  </g>

  <g transform="translate(28 184)" filter="url(#shadow)">
    <rect width="374" height="108" rx="18" fill="#fff" stroke="#dfe7e6"/>
    <g transform="translate(18 16)">
      <text x="0" y="16" class="label">Sleep</text>
      <text x="0" y="51" class="big" fill="#e28a0a">6 h 48</text>
      <text x="0" y="76" class="body">average night</text>
    </g>
    <g transform="translate(146 16)">
      <text x="0" y="16" class="label">Activity</text>
      <text x="0" y="51" class="big" fill="#15965b">7 420</text>
      <text x="0" y="76" class="body">steps / day</text>
    </g>
    <g transform="translate(282 16)">
      <text x="0" y="16" class="label">Sport</text>
      <text x="0" y="51" class="big" fill="#0b5d6f">4</text>
      <text x="0" y="76" class="body">sessions</text>
    </g>
  </g>

  <g transform="translate(28 313)" filter="url(#shadow)">
    <rect width="374" height="178" rx="18" fill="#fff" stroke="#dfe7e6"/>
    <text x="18" y="34" class="h2">Daily activity</text>
    <line class="axis" x1="48" y1="128" x2="328" y2="128"/>
    <line x1="48" y1="77" x2="328" y2="77" stroke="#ca8a04" stroke-width="1.4" stroke-dasharray="5 6"/>
    <line x1="48" y1="54" x2="328" y2="54" stroke="#16a34a" stroke-width="1.4" stroke-dasharray="5 6"/>
    <text x="334" y="57" font-size="10" font-weight="800" fill="#16a34a" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">10k</text>
    <text x="334" y="81" font-size="10" font-weight="800" fill="#ca8a04" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">7.5k</text>
    <rect x="55" y="83" width="26" height="45" rx="5" fill="#2f9460"/>
    <rect x="96" y="65" width="26" height="63" rx="5" fill="#2f9460"/>
    <rect x="137" y="90" width="26" height="38" rx="5" fill="#2f9460"/>
    <rect x="178" y="50" width="26" height="78" rx="5" fill="#2f9460"/>
    <rect x="219" y="75" width="26" height="53" rx="5" fill="#2f9460"/>
    <rect x="260" y="58" width="26" height="70" rx="5" fill="#2f9460"/>
    <rect x="301" y="71" width="26" height="57" rx="5" fill="#2f9460"/>
    <text x="55" y="154" class="body">Mon</text>
    <text x="137" y="154" class="body">Wed</text>
    <text x="219" y="154" class="body">Fri</text>
    <text x="301" y="154" class="body">Sun</text>
  </g>

  <g transform="translate(28 512)" filter="url(#shadow)">
    <rect width="374" height="178" rx="18" fill="#fff" stroke="#dfe7e6"/>
    <text x="18" y="34" class="h2">Sleep trend</text>
    <line class="axis" x1="48" y1="130" x2="328" y2="130"/>
    <line x1="48" y1="74" x2="328" y2="74" stroke="#2563eb" stroke-width="1.4" stroke-dasharray="5 6"/>
    <text x="334" y="78" font-size="10" font-weight="800" fill="#2563eb" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">7h</text>
    <polyline points="62,91 103,68 144,82 185,62 226,74 267,56 308,72" fill="none" stroke="#0b5d6f" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <g fill="#96f2df" stroke="#0b5d6f" stroke-width="3">
      <circle cx="62" cy="91" r="5"/>
      <circle cx="103" cy="68" r="5"/>
      <circle cx="144" cy="82" r="5"/>
      <circle cx="185" cy="62" r="5"/>
      <circle cx="226" cy="74" r="5"/>
      <circle cx="267" cy="56" r="5"/>
      <circle cx="308" cy="72" r="5"/>
    </g>
    <text x="55" y="154" class="body">Mon</text>
    <text x="137" y="154" class="body">Wed</text>
    <text x="219" y="154" class="body">Fri</text>
    <text x="301" y="154" class="body">Sun</text>
  </g>

  <g transform="translate(28 711)" filter="url(#shadow)">
    <rect width="374" height="114" rx="18" fill="#fff" stroke="#dfe7e6"/>
    <text x="18" y="31" class="h2">Cardio signals</text>
    <g transform="translate(18 50)">
      <text x="0" y="14" class="label">HRV</text>
      <text x="0" y="44" font-size="22" font-weight="900" fill="#7c3aed" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">41-62 ms</text>
    </g>
    <g transform="translate(154 50)">
      <text x="0" y="14" class="label">VO2 max</text>
      <text x="0" y="44" font-size="22" font-weight="900" fill="#0891b2" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">47.1-48.0</text>
    </g>
    <g transform="translate(284 50)">
      <text x="0" y="14" class="label">Calories</text>
      <text x="0" y="44" font-size="22" font-weight="900" fill="#16a34a" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">520</text>
    </g>
  </g>
</svg>
